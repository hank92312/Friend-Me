# fly.toml app configuration file generated for friends-and-me on 2026-05-10T18:03:10+08:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'friends-and-me'
primary_region = 'nrt'

[build]
  dockerfile = 'Dockerfile'

[env]
  DB_PATH = '/data/friends_and_me.db'

[[mounts]]
  source = 'friend_and_me_data'
  destination = '/data'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
